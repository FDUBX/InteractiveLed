<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive LED Display - PixiJS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
        }
        
        #pixiContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        
        .overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .title {
            font-size: 24px;
            margin-bottom: 15px;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }
        
        .info {
            margin: 10px 0;
            font-size: 14px;
        }
        
        .effects-info {
            color: #ffaa00;
            font-weight: bold;
        }
        
        .timeout-info {
            color: #00aaff;
        }
        
        .style-info {
            color: #ff6b9d;
            font-weight: bold;
        }
        
        .qr-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        
        .qr-code {
            width: 120px;
            height: 120px;
            background: #333;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .qr-text {
            font-size: 12px;
            color: #ccc;
        }
        
        .hidden {
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .visible {
            opacity: 1;
            transition: opacity 0.5s;
        }
        
        /* Animation d'apparition */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .overlay, .qr-container {
            animation: fadeIn 1s ease-out;
        }
    </style>
</head>
<body>
    <div id="pixiContainer"></div>
    
    <div class="overlay">
        <div class="title" id="title">🎨 Interactive LED Display</div>
        <div class="info effects-info">Mode: Effets purs (pas de traits)</div>
        <div class="info timeout-info">Timeout: <span id="timeout-display">3s</span></div>
        <div class="info style-info">Style: <span id="style-display">Van Gogh</span></div>
        <div class="info">🎆 Dessinez sur votre téléphone pour voir la magie ici ✨</div>
    </div>
    
    <div class="qr-container">
        <div class="qr-code" id="qrCode"></div>
        <div class="qr-text">Scannez pour dessiner</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="display-pixi.js"></script>
    <script src="style-processor.js"></script>
    <script>
        class InteractiveLEDDisplay {
            constructor() {
                this.socket = io();
                
                // Moteur de rendu PixiJS
                this.renderer = new PixiLEDRenderer('pixiContainer');
                
                // Processeur de style AdaIN
                this.styleProcessor = new AdaINStyleProcessor();
                
                this.currentEffect = 'particles';
                this.isDrawing = false;
                
                // Paramètres de timeout
                this.segmentTimeout = 3000; // 3 secondes par défaut
                
                // Initialisation non-bloquante
                this.setupSocketEvents();
                this.loadQRCode();
                this.initNonBlocking(); // En dernier, non-bloquant
            }
            
            async init() {
                try {
                    console.log('🚀 Début de l\'initialisation...');
                    
                    // Attendre que le processeur de style soit prêt
                    console.log('⏳ Attente du processeur de style...');
                    await this.styleProcessor.init();
                    console.log('✅ Processeur de style prêt');
                    
                    console.log('🎨 Display initialisé avec PixiJS et Style Processor');
                    
                    // Initialiser l'indicateur de style
                    this.updateStyleIndicator();
                    
                    console.log('🎯 Initialisation terminée avec succès !');
                } catch (error) {
                    console.error('❌ Erreur lors de l\'initialisation:', error);
                }
            }
            
            // Initialisation non-bloquante
            initNonBlocking() {
                this.init().catch(error => {
                    console.error('❌ Erreur critique lors de l\'initialisation:', error);
                });
            }
            

            
            setupSocketEvents() {
                this.socket.on('connect', () => {
                    console.log('🔌 Connecté au serveur WebSocket');
                    this.socket.emit('register', { type: 'display' });
                    console.log('📡 Enregistrement en tant que client display envoyé');
                });
                
                this.socket.on('disconnect', () => {
                    console.log('❌ Déconnecté du serveur WebSocket');
                });
                
                this.socket.on('error', (error) => {
                    console.error('🚨 Erreur WebSocket:', error);
                });
                
                this.socket.on('drawing-data', (data) => {
                    this.handleDrawingData(data);
                });
                
                this.socket.on('clear-canvas', () => {
                    this.clearCanvas();
                });
                
                this.socket.on('change-effect', (data) => {
                    this.currentEffect = data.effect;
                    console.log(`🎭 Effet changé vers: ${this.currentEffect}`);
                });
                
                this.socket.on('change-timeout', (data) => {
                    this.setStrokeTimeout(data.timeout);
                });
                
                this.socket.on('change-style', (data) => {
                    console.log('🎨 Événement change-style reçu côté affichage:', data);
                    this.changeStyle(data.style);
                });
            }
            
            handleDrawingData(data) {
                console.log('📥 Données de dessin reçues:', data);
                
                const { x, y, prevX, prevY, pressure, color, brushSize, clientId } = data;
                
                // Conversion des coordonnées relatives en absolues
                const canvasX = x * window.innerWidth;
                const canvasY = y * window.innerHeight;
                const canvasPrevX = prevX * window.innerWidth;
                const canvasPrevY = prevY * window.innerHeight;
                
                console.log(`📍 Coordonnées converties: (${canvasX}, ${canvasY})`);
                
                // Créer ou mettre à jour le trait en cours (pour statistiques)
                this.renderer.addStrokeSegment(canvasPrevX, canvasPrevY, canvasX, canvasY, color, brushSize, pressure, clientId);
                
                // Récupérer le style courant du processeur
                const currentStyle = this.styleProcessor.getCurrentStyle();
                console.log(`🎨 Style actuel pour le rendu: ${currentStyle}`);
                console.log(`🎨 Status du processeur:`, this.styleProcessor.getStatus());
                
                // Ajouter des effets selon le mode actuel
                switch (this.currentEffect) {
                    case 'particles':
                        console.log(`✨ Ajout de particules avec style: ${currentStyle}`);
                        this.renderer.addParticles(canvasX, canvasY, color, pressure, null, currentStyle);
                        break;
                    case 'trails':
                        console.log(`✨ Ajout de trails avec style: ${currentStyle}`);
                        this.renderer.addTrail(canvasX, canvasY, color, currentStyle);
                        break;
                    case 'glow':
                        console.log(`✨ Ajout de glow avec style: ${currentStyle}`);
                        this.renderer.addParticles(canvasX, canvasY, color, pressure, 20, currentStyle); // Plus de particules pour l'effet glow
                        break;
                }
            }
            
            // ===== Méthodes simplifiées avec PixiJS =====
            
            updateStatsDisplay() {
                const stats = this.renderer.getStats();
                document.getElementById('timeout-display').textContent = (this.segmentTimeout / 1000) + 's';
                
                // Debug: afficher dans la console les statistiques PixiJS
                if (stats.particles > 0 || stats.trails > 0) {
                    console.log(`🎨 PixiJS - Particules: ${stats.particles}, Trails: ${stats.trails}, FPS: ${stats.fps.toFixed(1)}`);
                }
            }
            
            clearCanvas() {
                this.renderer.clearCanvas();
                this.showTitle();
            }
            
            setStrokeTimeout(timeout) {
                this.segmentTimeout = timeout;
                this.renderer.setStrokeTimeout(timeout);
            }
            
            changeStyle(styleKey) {
                console.log(`🎭 Tentative de changement de style vers: ${styleKey}`);
                console.log(`🎭 Status du processeur avant:`, this.styleProcessor.getStatus());
                
                if (this.styleProcessor.setStyle(styleKey)) {
                    console.log(`🎭 Style changé avec succès vers: ${styleKey}`);
                    this.updateStyleDisplay();
                    this.updateStyleIndicator();
                } else {
                    console.error(`❌ Échec du changement de style vers: ${styleKey}`);
                }
            }
            
            updateStyleDisplay() {
                const styleInfo = this.styleProcessor.getStyleInfo(this.styleProcessor.currentStyle);
                if (styleInfo) {
                    console.log(`🎨 Style actuel: ${styleInfo.name} - ${styleInfo.description}`);
                }
            }
            
            updateStyleIndicator() {
                const currentStyle = this.styleProcessor.getCurrentStyle();
                const styleInfo = this.styleProcessor.getStyleInfo(currentStyle);
                if (styleInfo) {
                    document.getElementById('style-display').textContent = styleInfo.name;
                    console.log(`🎨 Indicateur de style mis à jour: ${styleInfo.name}`);
                }
            }
            
            hideTitle() {
                document.getElementById('title').classList.add('hidden');
            }
            
            showTitle() {
                document.getElementById('title').classList.remove('hidden');
            }
            
            loadQRCode() {
                // Simuler un QR code pour le moment
                const qrCode = document.getElementById('qrCode');
                qrCode.innerHTML = `
                    <svg width="120" height="120" viewBox="0 0 120 120">
                        <rect width="120" height="120" fill="#333"/>
                        <text x="60" y="60" text-anchor="middle" dy=".3em" fill="#fff" font-size="12">
                            QR Code
                        </text>
                    </svg>
                `;
                
                // Cacher le titre après 5 secondes
                setTimeout(() => this.hideTitle(), 5000);
            }
        }
        
        // Initialiser l'application quand la page est chargée
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Page affichage chargée, création de InteractiveLEDDisplay...');
            try {
                new InteractiveLEDDisplay();
                console.log('✅ InteractiveLEDDisplay créé avec succès');
            } catch (error) {
                console.error('❌ Erreur lors de la création de InteractiveLEDDisplay:', error);
            }
        });
    </script>
</body>
</html>
