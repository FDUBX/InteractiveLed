<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Contrôle Tactile - Interactive LED</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 5px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            height: 50px;
        }

        .status {
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        .btn.clear {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
        }

        .btn.clear:hover, .btn.clear:active {
            transform: scale(0.95);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .btn.effect {
            background: linear-gradient(45deg, #4834d4, #686de0);
        }

        .btn.effect:hover, .btn.effect:active {
            transform: scale(0.95);
            box-shadow: 0 0 20px rgba(72, 52, 212, 0.5);
        }

        #drawingCanvas {
            position: fixed;
            top: 50px;
            left: 0;
            right: 0;
            bottom: 80px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0;
            margin: 0;
            cursor: crosshair;
            touch-action: none;
            width: 100vw;
            height: calc(100vh - 130px);
        }

        .toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            padding: 8px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            height: 80px;
            z-index: 1001;
        }

        .color-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            flex-shrink: 0;
        }

        .color-btn.active {
            border-color: white;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .size-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .size-control label {
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .size-slider {
            width: 60px;
            height: 4px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            -webkit-appearance: none;
        }

        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        .pressure-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .pressure-indicator label {
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .pressure-bar {
            width: 8px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .pressure-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, #00ff88, #00d4aa);
            border-radius: 5px;
            transition: height 0.1s ease;
        }

        .connection-status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 2000;
        }

        .connection-status.hidden {
            display: none;
        }

        .drawing-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            text-align: center;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: row;
                gap: 5px;
            }
            
            .toolbar {
                flex-direction: row;
                gap: 5px;
                padding: 5px;
                height: 70px;
            }
            
            .color-picker {
                justify-content: center;
                gap: 4px;
            }
            
            .color-btn {
                width: 24px;
                height: 24px;
            }
            
            .size-slider {
                width: 50px;
            }
            
            .pressure-bar {
                height: 35px;
                width: 6px;
            }
            
            #drawingCanvas {
                height: calc(100vh - 120px);
                bottom: 70px;
            }
            
            .btn {
                padding: 6px 12px;
                font-size: 11px;
            }
        }
        
        @media (max-width: 480px) {
            .header {
                padding: 3px 10px;
                height: 45px;
            }
            
            .toolbar {
                height: 65px;
                padding: 3px;
            }
            
            #drawingCanvas {
                top: 45px;
                height: calc(100vh - 110px);
                bottom: 65px;
            }
            
            .color-btn {
                width: 22px;
                height: 22px;
            }
            
            .size-slider {
                width: 45px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="status" id="status">
            <span id="connection-indicator">🔴</span>
            <span id="status-text">Connexion...</span>
        </div>
        <div class="controls">
            <button class="btn clear" id="clearBtn">🗑️ Effacer</button>
            <button class="btn effect" id="effectBtn">✨ Effets</button>
            <button class="btn effect" id="timeoutBtn">⏰ 3s</button>
        <button class="btn effect" id="styleBtn">🎨 Van Gogh</button>
        </div>
    </div>

    <canvas id="drawingCanvas"></canvas>
    
            <div class="drawing-hint" id="drawingHint">
            🎆 Touchez l'écran et regardez la magie sur l'écran LED ✨
        </div>

    <div class="toolbar">
        <div class="color-picker" id="colorPicker">
            <div class="color-btn active" data-color="#ff6b6b" style="background: #ff6b6b;"></div>
            <div class="color-btn" data-color="#4834d4" style="background: #4834d4;"></div>
            <div class="color-btn" data-color="#00d4aa" style="background: #00d4aa;"></div>
            <div class="color-btn" data-color="#ff9ff3" style="background: #ff9ff3;"></div>
            <div class="color-btn" data-color="#feca57" style="background: #feca57;"></div>
            <div class="color-btn" data-color="#48dbfb" style="background: #48dbfb;"></div>
            <div class="color-btn" data-color="#ff9f43" style="background: #ff9f43;"></div>
            <div class="color-btn" data-color="#ffffff" style="background: #ffffff;"></div>
        </div>
        
        <div class="size-control">
            <label>Taille</label>
            <input type="range" class="size-slider" id="sizeSlider" min="2" max="20" value="8">
        </div>
        
        <div class="pressure-indicator">
            <label>Pression</label>
            <div class="pressure-bar">
                <div class="pressure-fill" id="pressureFill"></div>
            </div>
        </div>
    </div>

    <div class="connection-status" id="connectionStatus">
        <h3>🔗 Connexion en cours...</h3>
        <p>Connexion au serveur Interactive LED</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        class TouchDrawingController {
            constructor() {
                this.canvas = document.getElementById('drawingCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.socket = io();
                
                this.isDrawing = false;
                this.currentColor = '#ff6b6b';
                this.currentSize = 8;
                this.currentPressure = 0.5;
                this.lastPoint = { x: 0, y: 0 };
                
                this.effects = [
                    { name: 'Particules lumineuses', value: 'particles' },
                    { name: 'Traînées colorées', value: 'trails' },
                    { name: 'Lueur magique', value: 'glow' }
                ];
                this.currentEffectIndex = 0;
                
                // Paramètres de timeout
                            this.timeouts = [1, 2, 3, 5, 10, 15, 30, 60]; // Secondes
            this.currentTimeoutIndex = 2; // 3 secondes par défaut
            
            // Styles disponibles
            this.styles = ['van_gogh', 'kandinsky', 'picasso', 'monet', 'cyberpunk'];
            this.currentStyleIndex = 0; // Van Gogh par défaut
                
                this.init();
                this.setupSocketEvents();
                this.setupEventListeners();
            }
            
            init() {
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
                
                // Configuration du canvas
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
                this.ctx.globalCompositeOperation = 'source-over';
                
                // Empêcher le zoom et le scroll sur mobile
                document.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                }, { passive: false });
                
                document.addEventListener('gesturestart', (e) => {
                    e.preventDefault();
                });
                
                document.addEventListener('gesturechange', (e) => {
                    e.preventDefault();
                });
                
                document.addEventListener('gestureend', (e) => {
                    e.preventDefault();
                });
            }
            
            resizeCanvas() {
                const rect = this.canvas.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
            }
            
            setupSocketEvents() {
                console.log('🔌 Configuration des événements WebSocket côté contrôle...');
                
                // Gestion du statut de connexion
                this.socket.on('connect', () => {
                    console.log('🔌 Connecté au serveur WebSocket côté contrôle');
                    
                    // S'enregistrer SEULEMENT après la connexion
                    console.log('📡 Envoi de l\'enregistrement comme client control...');
                    this.socket.emit('register', { type: 'control' });
                    console.log('✅ Enregistrement envoyé');
                    
                    this.updateConnectionStatus(true, 'Connecté à l\'écran LED');
                    document.getElementById('connectionStatus').classList.add('hidden');
                });
                
                this.socket.on('disconnect', () => {
                    console.log('❌ Déconnecté du serveur WebSocket côté contrôle');
                    this.updateConnectionStatus(false, 'Connexion perdue');
                    document.getElementById('connectionStatus').classList.remove('hidden');
                });
                
                this.socket.on('status', (data) => {
                    console.log('📊 Status reçu côté contrôle:', data);
                    if (data.type === 'success') {
                        console.log('✅ Enregistrement confirmé par le serveur');
                        this.updateConnectionStatus(true, data.message);
                    } else if (data.type === 'info') {
                        console.log('ℹ️ Info du serveur:', data.message);
                    }
                });
                
                this.socket.on('error', (error) => {
                    console.error('🚨 Erreur WebSocket côté contrôle:', error);
                });
            }
            
            setupEventListeners() {
                // Gestion tactile
                this.canvas.addEventListener('touchstart', (e) => this.startDrawing(e), { passive: false });
                this.canvas.addEventListener('touchmove', (e) => this.draw(e), { passive: false });
                this.canvas.addEventListener('touchend', (e) => this.stopDrawing(e), { passive: false });
                
                // Gestion souris (pour tests)
                this.canvas.addEventListener('mousedown', (e) => this.startDrawing(e));
                this.canvas.addEventListener('mousemove', (e) => this.draw(e));
                this.canvas.addEventListener('mouseup', (e) => this.stopDrawing(e));
                this.canvas.addEventListener('mouseleave', (e) => this.stopDrawing(e));
                
                // Sélection des couleurs
                document.getElementById('colorPicker').addEventListener('click', (e) => {
                    if (e.target.classList.contains('color-btn')) {
                        document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentColor = e.target.getAttribute('data-color');
                    }
                });
                
                // Contrôle de la taille
                document.getElementById('sizeSlider').addEventListener('input', (e) => {
                    this.currentSize = parseInt(e.target.value);
                });
                
                // Boutons de contrôle
                document.getElementById('clearBtn').addEventListener('click', () => {
                    this.socket.emit('clear-canvas');
                    this.clearLocalCanvas();
                });
                
                document.getElementById('effectBtn').addEventListener('click', () => {
                    this.currentEffectIndex = (this.currentEffectIndex + 1) % this.effects.length;
                    const effect = this.effects[this.currentEffectIndex];
                    this.socket.emit('change-effect', effect);
                    
                    // Feedback visuel
                    const btn = document.getElementById('effectBtn');
                    btn.textContent = `✨ ${effect.name}`;
                    setTimeout(() => {
                        btn.textContent = '✨ Effets';
                    }, 2000);
                });
                
                document.getElementById('timeoutBtn').addEventListener('click', () => {
                    this.currentTimeoutIndex = (this.currentTimeoutIndex + 1) % this.timeouts.length;
                    const timeout = this.timeouts[this.currentTimeoutIndex];
                    this.socket.emit('change-timeout', { timeout: timeout * 1000 });
                    
                    // Mettre à jour le bouton
                    const btn = document.getElementById('timeoutBtn');
                    btn.textContent = `⏰ ${timeout}s`;
                });
                
                document.getElementById('styleBtn').addEventListener('click', () => {
                    this.currentStyleIndex = (this.currentStyleIndex + 1) % this.styles.length;
                    const style = this.styles[this.currentStyleIndex];
                    this.socket.emit('change-style', { style: style });
                    const btn = document.getElementById('styleBtn');
                    btn.textContent = `🎨 ${this.getStyleDisplayName(style)}`;
                });
            }
            
            getEventPoint(e) {
                e.preventDefault();
                
                let clientX, clientY, pressure = 0.5;
                
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                    
                    // Détection de la pression (si supportée)
                    if ('force' in e.touches[0] && e.touches[0].force > 0) {
                        pressure = Math.min(e.touches[0].force, 1);
                    } else if ('pressure' in e.touches[0] && e.touches[0].pressure > 0) {
                        pressure = Math.min(e.touches[0].pressure, 1);
                    }
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                const rect = this.canvas.getBoundingClientRect();
                const x = clientX - rect.left;
                const y = clientY - rect.top;
                
                return { 
                    x: x / rect.width, 
                    y: y / rect.height, 
                    pressure: pressure,
                    absoluteX: x,
                    absoluteY: y
                };
            }
            
            startDrawing(e) {
                console.log('🎨 Début du dessin - événement capturé');
                this.isDrawing = true;
                const point = this.getEventPoint(e);
                this.lastPoint = point;
                this.currentPressure = point.pressure;
                
                console.log('📍 Point de départ:', point);
                
                // Cacher l'hint de dessin
                document.getElementById('drawingHint').style.opacity = '0';
                
                // Mettre à jour l'indicateur de pression
                this.updatePressureIndicator(point.pressure);
                
                // Plus de point de départ - interface invisible
            }
            
            draw(e) {
                if (!this.isDrawing) return;
                
                const point = this.getEventPoint(e);
                this.currentPressure = point.pressure;
                
                // Mettre à jour l'indicateur de pression
                this.updatePressureIndicator(point.pressure);
                
                // Plus de dessin local - feedback purement tactile
                
                // Envoyer les données au serveur
                const drawingData = {
                    x: point.x,
                    y: point.y,
                    prevX: this.lastPoint.x,
                    prevY: this.lastPoint.y,
                    pressure: point.pressure,
                    color: this.currentColor,
                    brushSize: this.currentSize
                };
                
                console.log('📥 Données de dessin envoyées:', drawingData);
                this.socket.emit('drawing-data', drawingData);
                
                this.lastPoint = point;
            }
            
            stopDrawing(e) {
                this.isDrawing = false;
                this.currentPressure = 0;
                this.updatePressureIndicator(0);
            }
            
            // Fonctions de dessin local supprimées - interface pure sans feedback visuel
            
            clearLocalCanvas() {
                // Canvas toujours vide - pas de nettoyage nécessaire
                document.getElementById('drawingHint').style.opacity = '0.6';
            }
            
            getStyleDisplayName(styleKey) {
                const styleNames = {
                    'van_gogh': 'Van Gogh',
                    'kandinsky': 'Kandinsky',
                    'picasso': 'Picasso',
                    'monet': 'Monet',
                    'cyberpunk': 'Cyberpunk'
                };
                return styleNames[styleKey] || styleKey;
            }
            
            updatePressureIndicator(pressure) {
                const fill = document.getElementById('pressureFill');
                const height = Math.max(pressure * 100, 5);
                fill.style.height = height + '%';
            }
            
            updateConnectionStatus(connected, message) {
                const indicator = document.getElementById('connection-indicator');
                const statusText = document.getElementById('status-text');
                
                if (connected) {
                    indicator.textContent = '🟢';
                    statusText.textContent = message;
                    statusText.classList.remove('pulse');
                } else {
                    indicator.textContent = '🔴';
                    statusText.textContent = message;
                    statusText.classList.add('pulse');
                }
            }
        }
        
        // Initialisation de l'application
        window.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Page contrôle chargée, création de TouchDrawingController...');
            new TouchDrawingController();
        });
    </script>
</body>
</html>
